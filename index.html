<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cityflo Shift Report Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f2f5; }
  header { background: #1565c0; color: #fff; padding: 16px 28px; font-size: 22px; font-weight: bold; }
  header span { color: #90caf9; }
  .bar { background: #fff; padding: 18px 28px; display: flex; flex-wrap: wrap; gap: 18px; align-items: flex-end; border-bottom: 2px solid #ddd; }
  .fg { display: flex; flex-direction: column; gap: 5px; }
  .fg label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #666; letter-spacing: .5px; }
  .fg select { padding: 9px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; min-width: 175px; background: #fff; color: #222; cursor: pointer; }
  .fg select:focus { border-color: #1565c0; outline: none; }
  .btn-run { padding: 10px 32px; background: #1565c0; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 22px; }
  .btn-run:hover { background: #0d47a1; }
  .btn-clear { padding: 10px 20px; background: #fff; color: #555; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; cursor: pointer; margin-top: 22px; }
  .btn-clear:hover { background: #f0f0f0; }
  #main { padding: 28px; max-width: 1200px; margin: auto; }
  .date-block { margin-bottom: 34px; }
  .date-title { font-size: 13px; font-weight: bold; color: #1565c0; border-bottom: 2px solid #1565c0; display: inline-block; padding-bottom: 5px; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; }
  .chips { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .chip { background: #fff; border: 1px solid #ddd; border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
  .chip b { font-size: 15px; }
  .chip b.q { color: #e53935; }
  .chip b.o { color: #1976d2; }
  .chip b.d { color: #388e3c; }
  .shift-hdr { font-size: 12px; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: 1px; margin: 14px 0 10px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #ffa726; flex-shrink: 0; }
  .dot.ev { background: #7c4dff; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 10px; }
  .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 5px rgba(0,0,0,.1); overflow: hidden; }
  .card-top { padding: 12px 14px; color: #fff; font-size: 12px; font-weight: bold; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
  .card-top.q { background: #e53935; }
  .card-top.o { background: #1976d2; }
  .card-top.d { background: #388e3c; }
  .cnt { background: rgba(255,255,255,.25); border-radius: 10px; padding: 2px 9px; font-size: 12px; }
  .card-body { padding: 12px 14px; }
  .item { font-size: 13px; line-height: 1.65; padding: 8px 0; border-bottom: 1px solid #f2f2f2; color: #333; }
  .item:last-child { border-bottom: none; }
  .na { color: #bbb; font-style: italic; font-size: 13px; padding: 6px 0; }
  .empty { text-align: center; padding: 60px; color: #aaa; font-size: 16px; }
  .updated { font-size: 12px; color: #aaa; margin-left: auto; align-self: center; }
</style>

var ALL_DATES = ["2025-03-22", "2025-03-21", "2025-03-20", "2025-03-19", "2025-03-18", "2025-03-17"];

function runReport() {
  var fd = document.getElementById("sel-date").value;
  var fs = document.getElementById("sel-shift").value;
  var ft = document.getElementById("sel-type").value;
  var el = document.getElementById("main");

  var dates = (fd == "all") ? ALL_DATES : [fd];
  var shifts = (fs == "all") ? ["morning","evening"] : [fs];
  var types  = (ft == "all") ? ["quality","operational","driver"] : [ft];

  if (dates.length == 0) {
    el.innerHTML = '<div class="empty">No reports found.</div>';
    return;
  }

  var html = "";
  for (var i = 0; i < dates.length; i++) {
    var dt = dates[i];
    var en = DATA[dt];
    if (!en) continue;

    var tq=0, to=0, td=0;
    for (var s=0; s<shifts.length; s++) {
      var sh = en[shifts[s]] || {};
      tq += (sh.quality||[]).length;
      to += (sh.operational||[]).length;
      td += (sh.driver||[]).length;
    }

    html += '<div class="date-block">';
    html += '<div class="date-title">' + fmtDate(dt) + '</div>';
    html += '<div class="chips">';
    html += '<div class="chip"><b class="q">'+tq+'</b>&nbsp;Quality</div>';
    html += '<div class="chip"><b class="o">'+to+'</b>&nbsp;Operational</div>';
    html += '<div class="chip"><b class="d">'+td+'</b>&nbsp;Driver</div>';
    html += '</div>';

    for (var s=0; s<shifts.length; s++) {
      var shift = shifts[s];
      var sd = en[shift] || {};
      var dotcls = (shift=="evening") ? "dot ev" : "dot";
      html += '<div class="shift-hdr"><span class="'+dotcls+'"></span>' + cap(shift) + ' Shift</div>';
      html += '<div class="grid">';
      for (var t=0; t<types.length; t++) {
        var tp    = types[t];
        var items = sd[tp] || [];
        var lbl   = tp=="quality" ? "Quality Issues" : tp=="operational" ? "Operational Issues" : "Driver Issues";
        var cls   = tp=="quality" ? "q" : tp=="operational" ? "o" : "d";
        html += '<div class="card">';
        html += '<div class="card-top '+cls+'">'+lbl+'<span class="cnt">'+items.length+'</span></div>';
        html += '<div class="card-body">';
        if (items.length==0) {
          html += '<div class="na">NA</div>';
        } else {
          for (var k=0; k<items.length; k++) {
            html += '<div class="item">'+esc(items[k])+'</div>';
          }
        }
        html += '</div></div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  el.innerHTML = html || '<div class="empty">No reports found.</div>';
}

function clearAll() {
  document.getElementById("sel-date").value  = "all";
  document.getElementById("sel-shift").value = "all";
  document.getElementById("sel-type").value  = "all";
  runReport();
}

function fmtDate(iso) {
  var p = iso.split("-");
  var m = ["","January","February","March","April","May","June","July","August","September","October","November","December"];
  return parseInt(p[2]) + " " + m[parseInt(p[1])] + " " + p[0];
}
function cap(s) { return s.charAt(0).toUpperCase()+s.slice(1); }
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
